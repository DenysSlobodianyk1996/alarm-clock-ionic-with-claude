<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>AlarmClock</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">AlarmClock</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (alarms.length === 0) {
    <div class="empty-state">No alarms set</div>
  } @else {
    <ion-list>
      @for (alarm of alarms; track alarm.id) {
        <ion-item>
          <ion-label>
            <h2>{{ formatTime(alarm) }}</h2>
            <p>{{ alarm.description || 'No description' }}</p>
            <p>{{ formatRepeat(alarm) }}</p>
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openNewAlarm()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
